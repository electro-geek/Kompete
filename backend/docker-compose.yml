version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8001:8000"
    volumes:
      # Mount config.properties and .env directly so changes apply without rebuilds
      - ./config.properties:/app/config.properties
      - ./.env:/app/.env
      # Mount the sqlite DB (if used) to persist data
      - ./kompete.db:/app/kompete.db
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
